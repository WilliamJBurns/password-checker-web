<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #1a1a2e;
    }

    .card {
        background-color: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 90%;
        text-align: center;
    }

    h1 {
        margin-top: 0;
    }

    .description {
        color: #666;
        margin-bottom: 20px;
    }

    .input-row {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        padding: 10px 16px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f0f0f0;
    }

    button:hover {
        background-color: #ddd;
    }

    #barBackground {
        height: 20px;
        margin-top: 15px;
        background-color: lightgray;
        border-radius: 5px;
    }

    #strengthBar {
        height: 100%;
        width: 0%;
        border-radius: 5px;
        transition: width 0.5s, background-color 0.5s;
    }

    footer {
        margin-top: 20px;
        color: #888;
        font-size: 14px;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>Password Strength Checker</h1>
        <p class="description">Type a password to see how strong it is.</p>
        <div class="input-row">
            <input type="password" id="passwordInput" placeholder="Enter a password">
            <button id="togglePassword">Show</button>
        </div>
        <div id="barBackground">
            <div id="strengthBar"></div>
        </div>
        <p id="rating"></p>
        <p id="tip"></p>
    </div>
    <footer>Built by William Burns</footer>
    <script src="common-passwords.js"></script>
    <script>

    document.getElementById("passwordInput").addEventListener("input", function() {
        let password = this.value;

        if (password.length === 0) {
            document.getElementById("strengthBar").style.width = "0%";
            document.getElementById("strengthBar").style.backgroundColor = "lightgray";
            document.getElementById("rating").textContent = "";
            document.getElementById("tip").textContent = "";
            return;
        }

        let score = 0;
        let length = password.length;

        // Length score
        if (length >= 12) {
            score += 3;
        } else if (length >= 8) {
            score += 2;
        } else {
            score += 1;
        }

        // Character variety
        let hasLower = /[a-z]/.test(password);
        let hasUpper = /[A-Z]/.test(password);
        let hasDigit = /[0-9]/.test(password);
        let hasSpecial = /[^a-zA-Z0-9]/.test(password);

        if (hasLower) score++;
        if (hasUpper) score++;
        if (hasDigit) score++;
        if (hasSpecial) score++;

        // Overrides
        let isCommon = commonPasswords.includes(password.toLowerCase());
        if (isCommon) {
            score = 1;
        } else if (length < 5) {
            score = 1;
        }

        // Rating
        let rating;
        if (score <= 3) {
            rating = "WEAK";
        } else if (score <= 5) {
            rating = "MEDIUM";
        } else {
            rating = "STRONG";
        }

        // Tip
        let tip;
        if (isCommon) {
            tip = "Your password is on a list of common passwords. Pick something more unique!";
        } else if (length < 8) {
            tip = "Make your password at least 8 characters long.";
        } else if (!hasUpper) {
            tip = "Add some uppercase letters.";
        } else if (!hasLower) {
            tip = "Add some lowercase letters.";
        } else if (!hasDigit) {
            tip = "Throw in some numbers.";
        } else if (!hasSpecial) {
            tip = "Add a special character like ! @ # $ %";
        } else if (length < 12) {
            tip = "Try making it 12+ characters for extra security.";
        } else {
            tip = "Nice work! Your password is solid.";
        }

        // Color gradient based on score
        let percent = Math.round((score / 7) * 100);
        let color;
        if (percent <= 50) {
            // Red to orange/yellow
            let red = 255;
            let green = Math.round((percent / 50) * 200);
            color = "rgb(" + red + "," + green + ",0)";
        } else {
            // Yellow to green
            let red = Math.round(255 - ((percent - 50) / 50) * 255);
            let green = 200;
            color = "rgb(" + red + "," + green + ",0)";
        }

        document.getElementById("strengthBar").style.width = percent + "%";
        document.getElementById("strengthBar").style.backgroundColor = color;
        document.getElementById("rating").textContent = "Strength: " + rating + " (" + score + "/7)";
        document.getElementById("tip").textContent = tip;
    });

    document.getElementById("togglePassword").addEventListener("click", function() {
        let input = document.getElementById("passwordInput");
        if (input.type === "password") {
            input.type = "text";
            this.textContent = "Hide";
        } else {
            input.type = "password";
            this.textContent = "Show";
        }
    });

</script>
</body>
</html>
